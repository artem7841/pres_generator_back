name: CI/CD WebAPI Docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Клонируем репозиторий
      - uses: actions/checkout@v3

      # 2️⃣ Создаём директорию на сервере (если её нет)
      - name: Ensure backend directory exists
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /var/www/backend
            chmod 755 /var/www/backend
            ls -la /var/www

      # 3️⃣ Копируем файлы на сервер через SCP
      - name: Copy project to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."           # можно указать конкретные файлы/папки, если нужно
          target: "/var/www/backend"
          strip_components: 0
          overwrite: true

      # 4️⃣ Проверяем, что файлы на сервере
      - name: Debug files on server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== ROOT ==="
            whoami
            id
            echo "=== BACKEND DIR ==="
            ls -la /var/www/backend

      # 5️⃣ Поднимаем Docker Compose
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/backend
            docker-compose down
            docker-compose up -d --build
