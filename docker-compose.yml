services:
  api:
    build: .
    ports:
      - "5000:5000"
    volumes:
    - ./.env:/app/.env
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - Redis__ConnectionString=redis:6379
      - Converter__Url=http://converter:3000/
    depends_on:
      - redis
      - converter

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  converter:
    image: gotenberg/gotenberg:8

volumes:
  redis_data:
